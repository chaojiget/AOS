<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>AgentOS · Chat + LogFlow</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 0;
        background: #0f172a;
        color: #e2e8f0;
      }
      header {
        padding: 1.5rem 2rem;
        background: #1e293b;
        box-shadow: 0 1px 12px rgba(0, 0, 0, 0.4);
      }
      main {
        padding: 2rem;
        display: grid;
        gap: 1.5rem;
        max-width: 960px;
        margin: 0 auto;
      }
      textarea {
        width: 100%;
        min-height: 140px;
        padding: 1rem;
        font-size: 1rem;
        border-radius: 8px;
        border: 1px solid #334155;
        background: #0f172a;
        color: inherit;
      }
      button {
        padding: 0.75rem 1.5rem;
        border-radius: 999px;
        border: none;
        background: #38bdf8;
        color: #0f172a;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        background: #475569;
        cursor: not-allowed;
      }
      .panel {
        background: #1e293b;
        border-radius: 12px;
        padding: 1.5rem;
        box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.15);
      }
      .logs {
        white-space: pre-wrap;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        background: #0f172a;
        border-radius: 8px;
        padding: 1rem;
        max-height: 320px;
        overflow-y: auto;
      }
      .trace-info {
        font-size: 0.875rem;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>AgentOS · Chat + LogFlow</h1>
      <p class="trace-info">
        Submit a prompt to generate a response, inspect events, and replay episodes.
      </p>
    </header>
    <main>
      <section class="panel">
        <h2>Chat</h2>
        <textarea
          id="message"
          placeholder="Ask the agent for a summary or instruction..."
          aria-label="Agent prompt input"
          role="textbox"
        ></textarea>
        <div style="margin-top: 1rem; display: flex; gap: 1rem; align-items: center">
          <button id="run" type="button" aria-label="Run agent" role="button">Run</button>
          <span id="status" class="trace-info" role="status" aria-live="polite"></span>
        </div>
        <div style="margin-top: 1rem">
          <strong>Final Output</strong>
          <div
            id="final"
            class="logs"
            role="status"
            aria-live="polite"
            aria-label="Final agent output"
          ></div>
        </div>
      </section>
      <section class="panel">
        <h2>LogFlow</h2>
        <div class="trace-info" id="trace" role="status" aria-live="polite"></div>
        <div
          id="log"
          class="logs"
          role="log"
          aria-live="polite"
          aria-label="Streaming agent events"
        ></div>
      </section>
    </main>
    <script>
      const runButton = document.getElementById("run");
      const messageInput = document.getElementById("message");
      const finalOutput = document.getElementById("final");
      const logOutput = document.getElementById("log");
      const traceInfo = document.getElementById("trace");
      const status = document.getElementById("status");
      let eventSource = null;
      let logLines = [];
      let currentTraceId = null;

      function closeStream() {
        if (eventSource) {
          eventSource.close();
          eventSource = null;
        }
      }

      function appendLogLine(line) {
        logLines.push(line);
        logOutput.textContent = logLines.join("\n");
        logOutput.scrollTop = logOutput.scrollHeight;
      }

      async function hydrateEpisode(traceId) {
        try {
          const response = await fetch(`/api/episodes/${traceId}`);
          if (response.ok) {
            const text = (await response.text()).trim();
            if (text.length > 0) {
              logLines = text.split(/\n/);
              logOutput.textContent = logLines.join("\n");
              logOutput.scrollTop = logOutput.scrollHeight;
            }
          }
        } catch (error) {
          console.error("Failed to hydrate episode", error);
        }
      }

      function handleEnvelopeEvent(evt) {
        try {
          const payload = JSON.parse(evt.data);
          appendLogLine(JSON.stringify(payload));
          status.textContent = `Streaming ${payload.type}`;
        } catch (error) {
          console.error("Failed to parse event", error);
        }
      }

      function subscribeToEvents(traceId) {
        closeStream();
        const source = new EventSource(`/api/runs/${traceId}/stream`);
        eventSource = source;

        source.addEventListener("open", () => {
          status.textContent = "Running...";
        });

        const streamEvents = [
          "run.started",
          "run.progress",
          "plan.updated",
          "tool.succeeded",
          "tool.failed",
          "run.log",
          "run.ask",
          "run.score",
        ];

        streamEvents.forEach((eventName) => {
          source.addEventListener(eventName, handleEnvelopeEvent);
        });

        source.addEventListener("run.finished", async (evt) => {
          handleEnvelopeEvent(evt);
          try {
            const payload = JSON.parse(evt.data);
            const reason = payload.data?.reason ? ` (${payload.data.reason})` : "";
            status.textContent = `Completed${reason}`;
            finalOutput.textContent = JSON.stringify(payload.data?.outputs ?? null, null, 2);
          } catch (error) {
            status.textContent = "Completed";
            console.error("Failed to parse completion payload", error);
          }
          runButton.disabled = false;
          await hydrateEpisode(traceId);
          closeStream();
        });

        source.addEventListener("run.failed", async (evt) => {
          handleEnvelopeEvent(evt);
          try {
            const payload = JSON.parse(evt.data);
            const message = payload.data?.message || payload.message || "Run failed.";
            status.textContent = `Failed: ${message}`;
            finalOutput.textContent = message;
          } catch (error) {
            status.textContent = "Failed";
            finalOutput.textContent = "Run failed.";
            console.error("Failed to parse failure payload", error);
          }
          runButton.disabled = false;
          await hydrateEpisode(traceId);
          closeStream();
        });

        source.addEventListener("stream.end", () => {
          if (runButton.disabled) {
            status.textContent = "Stream closed";
            runButton.disabled = false;
          }
          closeStream();
        });

        source.onerror = () => {
          if (source.readyState === EventSource.CLOSED) {
            if (runButton.disabled) {
              status.textContent = "Stream closed";
              runButton.disabled = false;
            }
            closeStream();
          }
        };
      }

      async function runChat() {
        const prompt = messageInput.value.trim();
        closeStream();
        runButton.disabled = true;
        status.textContent = "Starting...";
        finalOutput.textContent = "";
        logOutput.textContent = "";
        traceInfo.textContent = "";
        logLines = [];

        try {
          const response = await fetch("/api/chat/send", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              text: prompt,
              ...(currentTraceId ? { trace_id: currentTraceId } : {}),
            }),
          });

          const payload = await response.json().catch(() => ({}));

          if (!response.ok || !payload) {
            throw new Error(payload.message || "Request failed");
          }

          const traceId = payload.trace_id;
          if (!traceId) {
            throw new Error("Trace id missing from response");
          }
          currentTraceId = traceId;
          traceInfo.textContent = `trace_id: ${traceId}`;
          status.textContent = "Waiting for events...";
          subscribeToEvents(traceId);
        } catch (error) {
          status.textContent = "Failed";
          finalOutput.textContent = String(error?.message || error);
          runButton.disabled = false;
        }
      }

      runButton.addEventListener("click", runChat);
      messageInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && (event.metaKey || event.ctrlKey)) {
          event.preventDefault();
          runChat();
        }
      });
    </script>
  </body>
</html>
