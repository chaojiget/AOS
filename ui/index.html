<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>AgentOS · Chat + LogFlow</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 0;
        background: #0f172a;
        color: #e2e8f0;
      }
      header {
        padding: 1.5rem 2rem;
        background: #1e293b;
        box-shadow: 0 1px 12px rgba(0, 0, 0, 0.4);
      }
      main {
        padding: 2rem;
        display: grid;
        gap: 1.5rem;
        max-width: 960px;
        margin: 0 auto;
      }
      textarea {
        width: 100%;
        min-height: 140px;
        padding: 1rem;
        font-size: 1rem;
        border-radius: 8px;
        border: 1px solid #334155;
        background: #0f172a;
        color: inherit;
      }
      button {
        padding: 0.75rem 1.5rem;
        border-radius: 999px;
        border: none;
        background: #38bdf8;
        color: #0f172a;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        background: #475569;
        cursor: not-allowed;
      }
      .panel {
        background: #1e293b;
        border-radius: 12px;
        padding: 1.5rem;
        box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.15);
      }
      .logs {
        white-space: pre-wrap;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        background: #0f172a;
        border-radius: 8px;
        padding: 1rem;
        max-height: 320px;
        overflow-y: auto;
      }
      .trace-info {
        font-size: 0.875rem;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>AgentOS · Chat + LogFlow</h1>
      <p class="trace-info">
        Submit a prompt to generate a response, inspect events, and replay episodes.
      </p>
    </header>
    <main>
      <section class="panel">
        <h2>Chat</h2>
        <textarea id="message" placeholder="Ask the agent for a summary or instruction..."></textarea>
        <div style="margin-top: 1rem; display: flex; gap: 1rem; align-items: center;">
          <button id="run" type="button">Run</button>
          <span id="status" class="trace-info"></span>
        </div>
        <div style="margin-top: 1rem;">
          <strong>Final Output</strong>
          <div id="final" class="logs"></div>
        </div>
      </section>
      <section class="panel">
        <h2>LogFlow</h2>
        <div class="trace-info" id="trace"></div>
        <div id="log" class="logs"></div>
      </section>
    </main>
    <script>
      const runButton = document.getElementById('run');
      const messageInput = document.getElementById('message');
      const finalOutput = document.getElementById('final');
      const logOutput = document.getElementById('log');
      const traceInfo = document.getElementById('trace');
      const status = document.getElementById('status');

      async function runChat() {
        const prompt = messageInput.value.trim();
        runButton.disabled = true;
        status.textContent = 'Running...';
        finalOutput.textContent = '';
        logOutput.textContent = '';
        traceInfo.textContent = '';

        try {
          const response = await fetch('/api/run', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: prompt }),
          });

          if (!response.ok) {
            const error = await response.json().catch(() => ({}));
            throw new Error(error.message || 'Request failed');
          }

          const data = await response.json();
          const traceId = data.trace_id;
          status.textContent = 'Completed';
          traceInfo.textContent = `trace_id: ${traceId}`;
          finalOutput.textContent = JSON.stringify(data.result, null, 2);

          const episodeResponse = await fetch(`/api/episodes/${traceId}`);
          if (episodeResponse.ok) {
            const episodeText = await episodeResponse.text();
            logOutput.textContent = episodeText.trim();
          } else {
            logOutput.textContent = 'Episode not available yet.';
          }
        } catch (error) {
          status.textContent = 'Failed';
          finalOutput.textContent = String(error.message || error);
        } finally {
          runButton.disabled = false;
        }
      }

      runButton.addEventListener('click', runChat);
      messageInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && (event.metaKey || event.ctrlKey)) {
          event.preventDefault();
          runChat();
        }
      });
    </script>
  </body>
</html>
