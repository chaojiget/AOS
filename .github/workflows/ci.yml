name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:
  merge_group:

permissions:
  contents: read

jobs:
  validation:
    name: Validate and Smoke
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm setup

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Smoke test
        run: pnpm smoke

      - name: Verify workflow artifacts
        if: success()
        run: |
          if [ ! -d episodes ] || [ -z "$(ls -A episodes)" ]; then
            echo "episodes directory missing or empty"
            exit 1
          fi
          if [ ! -d reports ] || [ -z "$(ls -A reports)" ]; then
            echo "reports directory missing or empty"
            exit 1
          fi

      - name: Upload episodes artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: episodes
          path: episodes
          if-no-files-found: warn

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: reports
          if-no-files-found: warn
